<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resume PDF Export Harness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Georgia&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f5f5f5;
      }
      #stage {
        background: #ffffff;
        margin: 0;
      }
      .label {
        font-family: -apple-system, sans-serif;
        padding: 8px 16px;
        background: #1f2937;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="label" id="status">Loading...</div>
    <div id="stage"></div>
    <script type="module">
      import React from 'https://esm.sh/react@19.2.6?dev'
      import ReactDOM from 'https://esm.sh/react-dom@19.2.6/client?dev'
      import * as RF from 'https://esm.sh/react@19.2.6?dev&deps=react@19.2.6'
      window.React = RF
      window.ReactDOM = ReactDOM
      window.__STAGE__ = document.getElementById('stage')
      window.__STATUS__ = document.getElementById('status')

      // Pull resume data from the embedded JSON (set by the puppeteer script)
      // and the selected template id from URL hash.
      function getQueryParams() {
        const u = new URL(location.href)
        return {
          template: u.searchParams.get('template'),
        }
      }

      const { template } = getQueryParams()
      window.__TEMPLATE_ID__ = template

      const dataScript = document.getElementById('resume-data')
      const data = JSON.parse(dataScript.textContent)

      // Use vite-served files: import the template module + context from vite origin
      const VITE_ORIGIN = new URL(document.baseURI).origin

      async function loadModule(path) {
        return await import(VITE_ORIGIN + path)
      }

      const [{ ResumeProvider, useResume }, TemplateMod] = await Promise.all([
        loadModule('/src/context/ResumeContext.jsx'),
        loadModule(`/src/components/resume/templates/${template}/index.jsx`),
      ])
      const Template = TemplateMod.default

      function App() {
        return React.createElement(
          ResumeProvider,
          { value: data },
          React.createElement(Template),
        )
      }

      window.__ROOT__ = ReactDOM.createRoot(document.getElementById('stage'))
      window.__ROOT__.render(React.createElement(App))

      window.__STATUS__.textContent = `Template ${template} rendered — ready`
      window.__READY__ = true
    </script>
    <script id="resume-data" type="application/json">__RESUME_DATA__</script>
  </body>
</html>
